name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package patches
        run: tar czf mt7902-bt-patches-${{ github.ref_name }}.tar.gz patches/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mt7902-bt-patches-${{ github.ref_name }}.tar.gz
